[main]
font=monospace:size=13
width=35
lines=10
terminal=ghostty
prompt=»
icon-theme=Adwaita
icons-enabled=yes
tabs=4
exit-on-keyboard-focus-loss=yes

[colors]
background=@background-fuzzel@
text=@foreground-fuzzel@
match=@blue-fuzzel@
selection=@surface-fuzzel@
selection-text=@foreground-fuzzel@
selection-match=@blue-fuzzel@
border=@overlay-fuzzel@

[border]
width=2
radius=10

[dmenu]
exit-immediately-if-empty=yes
